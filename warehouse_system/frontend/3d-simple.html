<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多机器人仓储系统 - 3D可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .ui-panel {
            position: fixed;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            z-index: 100;
            backdrop-filter: blur(10px);
            max-height: 80vh;
            overflow-y: auto;
        }

        .top-left {
            top: 15px;
            left: 15px;
            width: 320px;
        }

        .top-right {
            top: 15px;
            right: 15px;
            width: 300px;
        }

        .bottom-left {
            bottom: 15px;
            left: 15px;
            width: 280px;
        }

        .panel-title {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #667eea;
            padding-bottom: 5px;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #a8aecf;
        }

        .panel-value {
            color: #00ff88;
            text-align: right;
        }

        .robot-status {
            background: rgba(102, 126, 234, 0.1);
            border-left: 2px solid #667eea;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 11px;
        }

        .robot-name {
            color: #00ff88;
            font-weight: bold;
        }

        button {
            flex: 1;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 4px 2px;
        }

        button:hover {
            background: #7b8eea;
        }

        .help-text {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 50;
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid #667eea;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 50;
        }

        .status-light {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            margin-right: 8px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 左上角：系统状态 -->
    <div class="ui-panel top-left">
        <div class="panel-title">
            <span class="status-light"></span>系统状态
        </div>
        <div class="panel-row">
            <span>时间:</span>
            <span class="panel-value" id="timeValue">0.0s</span>
        </div>
        <div class="panel-row">
            <span>FPS:</span>
            <span class="panel-value" id="fpsValue">60</span>
        </div>
        <div class="panel-row">
            <span>订单:</span>
            <span class="panel-value" id="ordersValue">0</span>
        </div>
        <div class="panel-row">
            <span>待分配:</span>
            <span class="panel-value" id="pendingValue">0</span>
        </div>
        <div class="panel-row">
            <span>已完成:</span>
            <span class="panel-value" id="completedValue">0</span>
        </div>
        <div class="btn-group">
            <button onclick="startSim()">▶ 启动</button>
            <button onclick="pauseSim()">⏸ 暂停</button>
            <button onclick="resetSim()">🔄 重置</button>
            <button onclick="stepSim()">⏭ 步进</button>
        </div>
    </div>

    <!-- 右上角：机器人 -->
    <div class="ui-panel top-right">
        <div class="panel-title">🤖 机器人状态</div>
        <div id="robotsList"></div>
    </div>

    <!-- 左下角：图例 -->
    <div class="ui-panel bottom-left">
        <div class="panel-title">📍 图例</div>
        <div style="font-size: 11px; line-height: 1.8;">
            <div>🔵 空闲</div>
            <div>🔴 忙碌</div>
            <div>🟡 充电</div>
            <div>🟢 货架</div>
            <div>🟠 充电站</div>
        </div>
    </div>

    <!-- FPS计数器 -->
    <div class="fps-counter" id="fpsCounter">三维场景正在加载...</div>

    <!-- 帮助文本 -->
    <div class="help-text">
        <div style="color: #667eea; font-weight: bold; margin-bottom: 5px;">🎮 操作</div>
        <div>• 鼠标拖拽: 旋转</div>
        <div>• 滚轮: 缩放</div>
        <div>• 空格: 重置</div>
    </div>

    <!-- Three.js库 - 使用CDNjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ============ 配置 ============
        const API_URL = 'http://localhost:5001/api';
        
        // Three.js对象
        let scene, camera, renderer;
        let robots = {};
        let isInitialized = false;
        let frameCount = 0;
        let lastFpsTime = Date.now();
        
        // 简单的相机控制（替代OrbitControls）
        class SimpleCamera {
            constructor(camera, canvas) {
                this.camera = camera;
                this.canvas = canvas;
                this.radius = 60;
                this.theta = Math.PI / 4;
                this.phi = Math.PI / 3;
                this.target = { x: 25, y: 10, z: 25 };
                this.isDragging = false;
                this.lastX = 0;
                this.lastY = 0;
                
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', () => this.isDragging = false);
                this.canvas.addEventListener('wheel', (e) => this.onWheel(e));
            }
            
            onMouseDown(e) {
                if (e.button === 0) {
                    this.isDragging = true;
                    this.lastX = e.clientX;
                    this.lastY = e.clientY;
                }
            }
            
            onMouseMove(e) {
                if (this.isDragging) {
                    const dx = e.clientX - this.lastX;
                    const dy = e.clientY - this.lastY;
                    this.theta += dx * 0.01;
                    this.phi += dy * 0.01;
                    this.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this.phi));
                    this.lastX = e.clientX;
                    this.lastY = e.clientY;
                }
            }
            
            onWheel(e) {
                e.preventDefault();
                this.radius += e.deltaY * 0.1;
                this.radius = Math.max(20, Math.min(150, this.radius));
            }
            
            update() {
                const x = this.target.x + this.radius * Math.sin(this.phi) * Math.cos(this.theta);
                const y = this.target.y + this.radius * Math.cos(this.phi);
                const z = this.target.z + this.radius * Math.sin(this.phi) * Math.sin(this.theta);
                
                this.camera.position.set(x, y, z);
                this.camera.lookAt(this.target.x, this.target.y, this.target.z);
            }
            
            reset() {
                this.theta = Math.PI / 4;
                this.phi = Math.PI / 3;
                this.radius = 60;
                this.update();
            }
        }
        
        // ============ 初始化 ============
        function init() {
            if (!scene) {
                // 场景
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a1f3a);
                scene.fog = new THREE.Fog(0x1a1f3a, 100, 150);
                
                // 相机
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                // 渲染器
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);
                
                // 简单相机控制
                const controls = new SimpleCamera(camera, renderer.domElement);
                
                // 灯光
                const ambient = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambient);
                
                const directional = new THREE.DirectionalLight(0xffffff, 0.8);
                directional.position.set(30, 50, 30);
                directional.castShadow = true;
                scene.add(directional);
                
                // 创建仓库
                createWarehouse();
                
                // 事件
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        controls.reset();
                    }
                });
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                isInitialized = true;
                document.getElementById('fpsCounter').textContent = 'FPS: 60';
            }
        }
        
        function createWarehouse() {
            // 地板
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x2a3f5f })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            
            // 网格
            const grid = new THREE.GridHelper(50, 50, 0x444466, 0x222233);
            grid.position.y = 0.01;
            scene.add(grid);
            
            // 墙壁
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a2a4a });
            const walls = [
                { pos: [25, 10, 0], size: [50, 20, 1] },
                { pos: [25, 10, 50], size: [50, 20, 1] }
            ];
            walls.forEach(w => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
                mesh.position.set(...w.pos);
                scene.add(mesh);
            });
            
            // 货架
            const shelves = [
                { positions: [[5, 10], [15, 10], [25, 10], [35, 10]], color: 0x00ff88 },
                { positions: [[5, 25], [15, 25], [25, 25], [35, 25]], color: 0x00dd66 },
                { positions: [[5, 40], [15, 40], [25, 40], [35, 40]], color: 0x00bb44 }
            ];
            
            shelves.forEach(shelf => {
                shelf.positions.forEach(pos => {
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(3, 8, 3),
                        new THREE.MeshStandardMaterial({ color: shelf.color, emissive: shelf.color, emissiveIntensity: 0.2 })
                    );
                    mesh.position.set(pos[0], 4, pos[1]);
                    scene.add(mesh);
                });
            });
            
            // 充电站
            [[10, 5], [30, 5], [46, 25]].forEach(pos => {
                const platform = new THREE.Mesh(
                    new THREE.CylinderGeometry(2.5, 3, 0.5, 32),
                    new THREE.MeshStandardMaterial({ color: 0xff9500 })
                );
                platform.position.set(pos[0], 0.25, pos[1]);
                scene.add(platform);
                
                const post = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 4, 16),
                    new THREE.MeshStandardMaterial({ color: 0xccaa00 })
                );
                post.position.set(pos[0], 2, pos[1]);
                scene.add(post);
            });
        }
        
        function createRobot(data) {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1.2, 2),
                new THREE.MeshStandardMaterial({ color: 0x0088ff })
            );
            group.add(body);
            
            const cover = new THREE.Mesh(
                new THREE.BoxGeometry(2.2, 0.3, 2.2),
                new THREE.MeshStandardMaterial({ color: 0x004499 })
            );
            cover.position.y = 0.75;
            group.add(cover);
            
            const battery = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.1, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x00ff88 })
            );
            battery.position.set(0, 1.1, 1.2);
            group.add(battery);
            
            group.position.set(data.x, 0.6, data.y);
            scene.add(group);
            
            return { group, body, battery, bodyMat: body.material };
        }
        
        function updateRobot(id, data) {
            if (!robots[id]) robots[id] = createRobot(data);
            
            const robot = robots[id];
            robot.group.position.set(data.x, 0.6, data.y);
            
            const state = (data.state || '').toLowerCase();
            let color = 0x0088ff;
            if (state === 'moving' || state === 'busy') color = 0xff6b6b;
            else if (state === 'charging') color = 0xffd93d;
            
            robot.bodyMat.color.setHex(color);
            robot.battery.scale.x = Math.max(0, Math.min(1, (data.battery || 100) / 100));
        }
        
        // ============ 数据更新 ============
        let lastUpdate = 0;
        
        async function updateData() {
            try {
                const res = await fetch(`${API_URL}/status`);
                const data = await res.json();
                
                if (!data.success) return;
                
                const state = data.data;
                document.getElementById('timeValue').textContent = (state.current_time || 0).toFixed(1) + 's';
                document.getElementById('ordersValue').textContent = (state.all_orders || []).length;
                
                const pending = (state.all_orders || []).filter(o => o.status === 'pending').length;
                const completed = (state.all_orders || []).filter(o => o.status === 'completed').length;
                
                document.getElementById('pendingValue').textContent = pending;
                document.getElementById('completedValue').textContent = completed;
                
                const robotsList = state.robots?.robots || [];
                robotsList.forEach(r => updateRobot(r.id, r));
                
                let html = '';
                robotsList.slice(0, 5).forEach(r => {
                    const state = (r.state || '').toLowerCase();
                    const color = state === 'idle' ? '#00ff88' : state === 'moving' || state === 'busy' ? '#ff6b6b' : '#ffd93d';
                    html += `<div class="robot-status">
                        <div class="robot-name">#${r.id}</div>
                        <div><span style="color: ${color}">${r.state}</span> (${r.x?.toFixed(0)},${r.y?.toFixed(0)}) ${r.battery?.toFixed(0)}% 任务:${r.tasks_in_queue}</div>
                    </div>`;
                });
                document.getElementById('robotsList').innerHTML = html || '无数据';
            } catch (e) {
                console.error('数据更新失败:', e);
            }
        }
        
        // ============ 控制 ============
        function startSim() { fetch(`${API_URL}/simulation/start`, { method: 'POST' }); }
        function pauseSim() { fetch(`${API_URL}/simulation/pause`, { method: 'POST' }); }
        function resetSim() { fetch(`${API_URL}/simulation/reset`, { method: 'POST' }); }
        function stepSim() { fetch(`${API_URL}/simulation/step`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ delta_time: 1.0 }) }); }
        
        // ============ 动画循环 ============
        function animate() {
            requestAnimationFrame(animate);
            
            if (!isInitialized || !renderer) return;
            
            renderer.render(scene, camera);
            
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fpsValue').textContent = frameCount;
                document.getElementById('fpsCounter').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
            
            if (now - lastUpdate >= 500) {
                updateData();
                lastUpdate = now;
            }
        }
        
        // ============ 启动 ============
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof THREE !== 'undefined') {
                init();
                animate();
                console.log('✅ 3D场景已初始化');
            } else {
                document.getElementById('fpsCounter').textContent = '❌ Three.js加载失败';
            }
        });
    </script>
</body>
</html>
